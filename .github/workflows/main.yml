name: ReDeploy Test

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to deploy (e.g. v1.1.0)"
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout specific version
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version }}

      - name: Show deployed version
        run: echo "Deploying version ${{ inputs.version }}"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build app
        run: npm run build

      - name: Deploy to production
        run: |
          echo "Deploying to production..."
          # replace this with your real deploy command
          # e.g. kubectl, docker, ssh, etc.
